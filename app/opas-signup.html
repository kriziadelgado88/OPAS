<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="opas-runtime" content="http://localhost:8001">
<title>OPAS — Sign up</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --brand: #1a3a5c;
    --brand-hover: #254f7a;
    --brand-light: #e8f0f8;
    --accent: #c8a951;
    --border: #dde3ea;
    --text: #1c2b3a;
    --muted: #64748b;
    --error-bg: #fef2f2;
    --error-fg: #b42318;
    --success-bg: #ecfdf3;
    --success-fg: #067647;
    --radius: 12px;
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  body {
    font-family: var(--font);
    color: var(--text);
    background: linear-gradient(180deg, #f8fafc 0%, #eef3f9 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  .card {
    width: 100%;
    max-width: 440px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px 32px 28px;
    box-shadow: 0 8px 28px rgba(26, 58, 92, 0.08);
  }

  .logo {
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.12em;
    color: var(--brand);
    text-align: center;
    margin-bottom: 4px;
  }
  .logo-accent {
    width: 28px; height: 3px;
    background: var(--accent);
    border-radius: 2px;
    margin: 0 auto 22px;
  }

  h1 {
    font-size: 22px;
    font-weight: 600;
    text-align: center;
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 14px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 24px;
    line-height: 1.5;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  input[type="email"], input[type="text"] {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    font-size: 15px;
    font-family: var(--font);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    margin-bottom: 16px;
  }
  input[type="email"]:focus, input[type="text"]:focus {
    border-color: var(--brand);
    box-shadow: 0 0 0 3px rgba(26, 58, 92, 0.08);
  }

  button.primary {
    width: 100%;
    background: var(--brand);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 15px;
    font-weight: 600;
    font-family: var(--font);
    cursor: pointer;
    transition: background 0.15s;
    margin-top: 4px;
  }
  button.primary:hover:not(:disabled) { background: var(--brand-hover); }
  button.primary:disabled { opacity: 0.55; cursor: default; }

  button.secondary {
    width: 100%;
    background: #fff;
    color: var(--brand);
    border: 1px solid var(--brand);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  button.secondary:hover:not(:disabled) { background: var(--brand-light); }

  .status {
    margin-top: 18px;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.5;
    display: none;
  }
  .status.show { display: block; }
  .status.error   { background: var(--error-bg);   color: var(--error-fg);   border: 1px solid #fecaca; }
  .status.success { background: var(--success-bg); color: var(--success-fg); border: 1px solid #abefc6; }
  .status.success strong { display: block; margin-bottom: 4px; font-weight: 600; }

  .dev-toggle {
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px dashed var(--border);
    text-align: center;
  }
  .dev-toggle .toggle-link {
    background: none; border: none; padding: 0;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    text-decoration: underline;
    text-decoration-style: dotted;
    text-underline-offset: 3px;
  }
  .dev-toggle .toggle-link:hover { color: var(--brand); }

  .dev-panel {
    display: none;
    margin-top: 14px;
    padding: 14px;
    background: #fafbfc;
    border: 1px solid var(--border);
    border-radius: 10px;
    text-align: left;
  }
  .dev-panel.show { display: block; }
  .dev-panel p {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 10px;
    line-height: 1.5;
  }
  .dev-panel code {
    font-family: 'Cascadia Code', 'Consolas', monospace;
    font-size: 11.5px;
    background: #eef1f5;
    padding: 1px 5px;
    border-radius: 3px;
    color: var(--brand);
  }

  .footer-link {
    margin-top: 20px;
    text-align: center;
    font-size: 13px;
    color: var(--muted);
  }
  .footer-link a {
    color: var(--brand);
    text-decoration: none;
    font-weight: 500;
  }
  .footer-link a:hover { text-decoration: underline; }

  @media (max-width: 420px) {
    .card { padding: 28px 22px 22px; }
    h1 { font-size: 20px; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">OPAS</div>
    <div class="logo-accent"></div>

    <h1>Sign up</h1>
    <p class="subtitle">We&rsquo;ll email you a magic link &mdash; click it to start learning.</p>

    <form id="signup-form" autocomplete="on" novalidate>
      <label for="name">Your name</label>
      <input type="text" id="name" name="name" placeholder="Jane Doe" required autocomplete="name">

      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@school.edu" required autocomplete="email">

      <button type="submit" class="primary" id="submit-btn">Send me a magic link</button>
    </form>

    <div id="status" class="status" role="status" aria-live="polite"></div>

    <div class="dev-toggle">
      <button type="button" class="toggle-link" id="dev-toggle-link">Use dev bearer instead</button>
      <div class="dev-panel" id="dev-panel">
        <p>Skips email entirely. Stores the dev bearer in <code>localStorage</code> and jumps straight to your agents.</p>
        <button type="button" class="secondary" id="dev-bearer-btn">Use dev-token-change-me</button>
      </div>
    </div>

    <div class="footer-link">
      Already signed in? <a href="opas-skills.html">Go to my agents &rarr;</a>
    </div>
  </div>

<script>
(function () {
  const RUNTIME = document.querySelector('meta[name="opas-runtime"]').content;

  const form        = document.getElementById('signup-form');
  const nameEl      = document.getElementById('name');
  const emailEl     = document.getElementById('email');
  const submitBtn   = document.getElementById('submit-btn');
  const statusEl    = document.getElementById('status');
  const toggleLink  = document.getElementById('dev-toggle-link');
  const devPanel    = document.getElementById('dev-panel');
  const devBtn      = document.getElementById('dev-bearer-btn');

  function showStatus(kind, html) {
    statusEl.className = 'status show ' + kind;
    statusEl.innerHTML = html;
  }
  function hideStatus() {
    statusEl.className = 'status';
    statusEl.textContent = '';
  }

  // --- magic-link signup ----------------------------------------------------
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideStatus();

    const name  = nameEl.value.trim();
    const email = emailEl.value.trim();
    if (!name || !email) {
      showStatus('error', 'Please enter both your name and email.');
      return;
    }
    if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) {
      showStatus('error', 'That email doesn&rsquo;t look right.');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Sending\u2026';

    try {
      const res = await fetch(RUNTIME + '/auth/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, name }),
      });
      if (!res.ok) {
        const detail = await safeDetail(res);
        throw new Error(detail);
      }
      const data = await res.json();
      if (data && data.sent) {
        showStatus('success',
          '<strong>Check your email.</strong>Click the link we just sent to <em>' +
          escapeHtml(email) + '</em> to come back signed in.'
        );
        form.style.display = 'none';
      } else {
        throw new Error('Unexpected response from server.');
      }
    } catch (err) {
      showStatus('error', 'Couldn&rsquo;t send the magic link: ' + escapeHtml(err.message || String(err)));
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Send me a magic link';
    }
  });

  // --- dev-bearer toggle ----------------------------------------------------
  toggleLink.addEventListener('click', () => {
    devPanel.classList.toggle('show');
  });

  devBtn.addEventListener('click', async () => {
    hideStatus();
    devBtn.disabled = true;
    devBtn.textContent = 'Verifying\u2026';

    try {
      // Validate the dev bearer against /me before storing — fail fast if backend
      // is misconfigured rather than dumping the user into a dead session.
      const res = await fetch(RUNTIME + '/me', {
        headers: { 'Authorization': 'Bearer dev-token-change-me' },
      });
      if (!res.ok) {
        const detail = await safeDetail(res);
        throw new Error(detail);
      }
      const me = await res.json();

      localStorage.setItem('opas_learner_token', 'dev-token-change-me');
      localStorage.setItem('opas_learner_id',    me.learner_id || '');
      localStorage.setItem('opas_learner_name',  me.name || 'Dev learner');

      // Honour a pending group invite if the user landed here from an invite link.
      const pendingInvite = localStorage.getItem('opas_pending_invite');
      if (pendingInvite) {
        localStorage.removeItem('opas_pending_invite');
        window.location.href = 'opas-group.html?invite=' + encodeURIComponent(pendingInvite);
        return;
      }

      const isFirstTime = !me.profile_prefs || Object.keys(me.profile_prefs).length === 0;
      window.location.href = isFirstTime ? 'opas-onboarding.html' : 'opas-skills.html';
    } catch (err) {
      showStatus('error', 'Dev bearer rejected: ' + escapeHtml(err.message || String(err)));
      devBtn.disabled = false;
      devBtn.textContent = 'Use dev-token-change-me';
    }
  });

  // --- helpers --------------------------------------------------------------
  async function safeDetail(res) {
    try {
      const j = await res.json();
      return j.detail || ('HTTP ' + res.status);
    } catch {
      return 'HTTP ' + res.status;
    }
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
})();
</script>
</body>
</html>
