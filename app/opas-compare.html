<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="opas-runtime" content="http://localhost:8001">
<title>OPAS — Model Compare</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --brand: #1a3a5c;
    --brand-light: #e8f0f8;
    --accent: #c8a951;
    --border: #dde3ea;
    --text: #1c2b3a;
    --muted: #64748b;
    --radius: 10px;
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    --panel-bg: #f8fafc;
    --panel-header-bg: #fff;
    --error-border: #e53e3e;
    --error-bg: #fff5f5;
    --error-text: #c53030;
  }

  body {
    font-family: var(--font);
    color: var(--text);
    background: #f0f4f8;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TOP BAR ─────────────────────────────────── */
  #topbar {
    background: var(--brand);
    color: #fff;
    padding: 0 20px;
    height: 52px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    z-index: 10;
  }
  #topbar .logo { font-weight: 700; font-size: 15px; letter-spacing: .04em; opacity: .9; }
  #topbar .skill-name { font-size: 13px; opacity: .7; }
  #topbar .subtitle { font-size: 12px; opacity: .5; margin-left: 4px; }
  #topbar .spacer { flex: 1; }
  #topbar .badge {
    font-size: 11px; font-weight: 600; letter-spacing: .06em;
    background: var(--accent); color: #1a1a1a;
    padding: 3px 8px; border-radius: 20px;
  }

  /* ── PANELS AREA ─────────────────────────────── */
  #panels-area {
    flex: 1;
    display: flex;
    gap: 10px;
    padding: 12px;
    overflow: hidden;
    min-height: 0;
  }

  .panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    min-width: 0;
  }
  .panel.error-state { border-color: var(--error-border); }

  .panel-header {
    background: var(--panel-header-bg);
    border-bottom: 1px solid var(--border);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .panel-model-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--brand);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }
  .latency-badge {
    font-size: 11px;
    font-weight: 600;
    background: var(--brand-light);
    color: var(--brand);
    padding: 2px 7px;
    border-radius: 10px;
    white-space: nowrap;
    display: none;
  }
  .latency-badge.visible { display: inline-block; }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 14px;
    font-size: 14px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text);
  }
  .panel-body.error-body { color: var(--error-text); background: var(--error-bg); }

  .panel-footer {
    border-top: 1px solid var(--border);
    padding: 8px 14px;
    flex-shrink: 0;
  }
  .citation-toggle {
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    font-family: inherit;
    text-decoration: underline dotted;
  }
  .citation-toggle:hover { color: var(--brand); }
  .citation-list {
    display: none;
    margin-top: 8px;
    font-size: 12px;
    color: var(--muted);
  }
  .citation-list.open { display: block; }
  .citation-item {
    padding: 4px 0;
    border-top: 1px solid var(--border);
    margin-top: 4px;
  }
  .citation-source { font-weight: 600; color: var(--brand); }

  /* ── SPINNER ─────────────────────────────────── */
  .spinner-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--brand);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── BOTTOM BAR ──────────────────────────────── */
  #bottom-bar {
    background: #fff;
    border-top: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: flex-end;
    gap: 8px;
    flex-shrink: 0;
    z-index: 10;
  }
  #user-input {
    flex: 1;
    resize: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 13px;
    font-size: 14px;
    font-family: var(--font);
    line-height: 1.5;
    outline: none;
    min-height: 40px;
    max-height: 120px;
    overflow-y: auto;
    color: var(--text);
    transition: border-color .15s;
  }
  #user-input:focus { border-color: var(--brand); }
  #user-input:disabled { background: #f5f5f5; cursor: not-allowed; }

  #ask-btn {
    background: var(--brand); color: #fff;
    border: none; border-radius: 8px;
    padding: 0 18px; height: 40px;
    font-size: 14px; font-weight: 600;
    cursor: pointer; transition: background .15s; flex-shrink: 0;
  }
  #ask-btn:hover { background: #254f7a; }
  #ask-btn:disabled { opacity: .45; cursor: default; }

  #clear-btn {
    background: none; color: var(--muted);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 0 14px; height: 40px;
    font-size: 13px; font-weight: 500;
    cursor: pointer; transition: border-color .15s; flex-shrink: 0;
  }
  #clear-btn:hover { border-color: var(--brand); color: var(--brand); }
  #clear-btn:disabled { opacity: .4; cursor: default; }

  /* ── PLACEHOLDER TEXT ────────────────────────── */
  .placeholder {
    color: var(--muted);
    font-size: 13px;
    text-align: center;
    padding: 20px;
    font-style: italic;
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <span class="logo">OPAS</span>
  <span class="skill-name" id="skill-label">Loading…</span>
  <span class="subtitle" id="skill-subtitle"></span>
  <span class="spacer"></span>
  <span class="badge">MODEL COMPARE</span>
</div>

<!-- THREE PANELS -->
<div id="panels-area">
  <!-- panels injected by JS -->
</div>

<!-- BOTTOM INPUT BAR -->
<div id="bottom-bar">
  <textarea id="user-input" rows="1" placeholder="Type a question and hit Ask…"></textarea>
  <button id="ask-btn">Ask</button>
  <button id="clear-btn">Clear</button>
</div>

<script type="module">
// ─────────────────────────────────────────────────────────────────────────────
// Config
// ─────────────────────────────────────────────────────────────────────────────
const RUNTIME_URL = document.querySelector('meta[name="opas-runtime"]')?.content ?? 'http://localhost:8001';
const BEARER      = 'dev-token-change-me';

const DEFAULT_MODELS = [
  'claude-sonnet-4-6',
  'gpt-4o',
  'gemini-2.5-flash',
];

const params   = new URLSearchParams(location.search);
const SKILL_ID = params.get('skill_id') ?? 'hks.iga250.week2.emerging-technologies';
const MODELS   = params.get('models') ? params.get('models').split(',').map(s => s.trim()) : DEFAULT_MODELS;

// ─────────────────────────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────────────────────────
let busy = false;

// ─────────────────────────────────────────────────────────────────────────────
// DOM refs
// ─────────────────────────────────────────────────────────────────────────────
const $panelsArea  = document.getElementById('panels-area');
const $skillLabel  = document.getElementById('skill-label');
const $subtitle    = document.getElementById('skill-subtitle');
const $input       = document.getElementById('user-input');
const $askBtn      = document.getElementById('ask-btn');
const $clearBtn    = document.getElementById('clear-btn');

// ─────────────────────────────────────────────────────────────────────────────
// Build panels (one per model)
// ─────────────────────────────────────────────────────────────────────────────
const panelEls = MODELS.map(modelName => {
  const panel = document.createElement('div');
  panel.className = 'panel';

  const header = document.createElement('div');
  header.className = 'panel-header';

  const nameEl = document.createElement('span');
  nameEl.className = 'panel-model-name';
  nameEl.textContent = friendlyModelName(modelName);

  const badge = document.createElement('span');
  badge.className = 'latency-badge';

  header.appendChild(nameEl);
  header.appendChild(badge);

  const body = document.createElement('div');
  body.className = 'panel-body';
  body.innerHTML = `<div class="placeholder">Ask a question below to compare responses.</div>`;

  const footer = document.createElement('div');
  footer.className = 'panel-footer';
  footer.innerHTML = `<button class="citation-toggle" style="display:none">0 sources</button>
    <div class="citation-list"></div>`;

  panel.appendChild(header);
  panel.appendChild(body);
  panel.appendChild(footer);
  $panelsArea.appendChild(panel);

  const citToggle = footer.querySelector('.citation-toggle');
  const citList   = footer.querySelector('.citation-list');
  citToggle.addEventListener('click', () => {
    citList.classList.toggle('open');
    citToggle.textContent = citList.classList.contains('open')
      ? citToggle.dataset.count + ' sources ▲'
      : citToggle.dataset.count + ' sources ▼';
  });

  return { panel, body, badge, citToggle, citList };
});

// ─────────────────────────────────────────────────────────────────────────────
// Helpers
// ─────────────────────────────────────────────────────────────────────────────
function friendlyModelName(id) {
  const map = {
    'claude-sonnet-4-6': 'Claude Sonnet 4.6',
    'claude-opus-4-7':   'Claude Opus 4.7',
    'gpt-4o':            'GPT-4o',
    'gpt-4o-mini':       'GPT-4o mini',
    'gemini-2.5-pro':    'Gemini 2.5 Pro',
    'gemini-2.5-flash':  'Gemini 2.5 Flash',
  };
  return map[id] ?? id;
}

function setSpinner(idx) {
  const { body, badge, citToggle, panel } = panelEls[idx];
  panel.classList.remove('error-state');
  body.className = 'panel-body';
  body.innerHTML = `<div class="spinner-wrap"><div class="spinner"></div></div>`;
  badge.className = 'latency-badge';
  badge.textContent = '';
  citToggle.style.display = 'none';
}

function renderResponse(idx, resp) {
  const { body, badge, citToggle, citList, panel } = panelEls[idx];

  if (resp.error) {
    panel.classList.add('error-state');
    body.className = 'panel-body error-body';
    body.textContent = `Error: ${resp.error}`;
    badge.className = 'latency-badge visible';
    badge.textContent = (resp.latency_ms / 1000).toFixed(1) + 's';
    citToggle.style.display = 'none';
    return;
  }

  panel.classList.remove('error-state');
  body.className = 'panel-body';
  body.textContent = resp.reply ?? '';

  badge.className = 'latency-badge visible';
  badge.textContent = (resp.latency_ms / 1000).toFixed(1) + 's';

  const count = resp.citations?.length ?? 0;
  if (count > 0) {
    citToggle.style.display = '';
    citToggle.dataset.count = count;
    citToggle.textContent = `${count} source${count !== 1 ? 's' : ''} ▼`;
    citList.className = 'citation-list';
    citList.innerHTML = resp.citations.map(c => {
      const meta = c.metadata ?? {};
      const title = meta.source_title ?? c.source_id ?? 'Source';
      const page  = meta.page_num ? ` p.${meta.page_num}` : '';
      const section = meta.section_heading ? ` §${meta.section_heading}` : '';
      const sim = c.similarity != null ? ` (${(c.similarity * 100).toFixed(0)}%)` : '';
      return `<div class="citation-item">
        <span class="citation-source">${escHtml(title)}${escHtml(page)}${escHtml(section)}${escHtml(sim)}</span>
        <div>${escHtml((c.chunk_text ?? '').slice(0, 140))}…</div>
      </div>`;
    }).join('');
  } else {
    citToggle.style.display = 'none';
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function setInputEnabled(enabled) {
  $input.disabled  = !enabled;
  $askBtn.disabled = !enabled;
}

// ─────────────────────────────────────────────────────────────────────────────
// Load skill meta (for title)
// ─────────────────────────────────────────────────────────────────────────────
async function loadSkillMeta() {
  try {
    const res = await fetch(
      `${RUNTIME_URL}/session/skill/${encodeURIComponent(SKILL_ID)}`,
      { headers: { Authorization: `Bearer ${BEARER}` } }
    );
    if (!res.ok) return;
    const data = await res.json();
    $skillLabel.textContent = data.name ?? SKILL_ID;
    $subtitle.textContent   = '— Same skill, three models';
    document.title = `OPAS Compare — ${data.name ?? SKILL_ID}`;
  } catch (_) {
    $skillLabel.textContent = SKILL_ID;
    $subtitle.textContent   = '— Same skill, three models';
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// Ask
// ─────────────────────────────────────────────────────────────────────────────
async function ask() {
  const msg = $input.value.trim();
  if (!msg || busy) return;

  busy = true;
  setInputEnabled(false);

  // Show spinners in all panels simultaneously.
  MODELS.forEach((_, i) => setSpinner(i));

  try {
    const res = await fetch(`${RUNTIME_URL}/session/compare`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${BEARER}`,
      },
      body: JSON.stringify({
        skill_id: SKILL_ID,
        learner_msg: msg,
        models: MODELS,
      }),
    });

    if (!res.ok) {
      const errText = await res.text();
      MODELS.forEach((m, i) => renderResponse(i, {
        model: m, reply: null, citations: [], yaml_refs: [],
        latency_ms: 0, error: `HTTP ${res.status}: ${errText.slice(0, 200)}`,
      }));
      return;
    }

    const data = await res.json();

    // Render responses in the same order as models list.
    const responseMap = {};
    for (const r of data.responses) responseMap[r.model] = r;
    MODELS.forEach((m, i) => {
      const r = responseMap[m] ?? {
        model: m, reply: null, citations: [], yaml_refs: [], latency_ms: 0,
        error: 'No response received',
      };
      renderResponse(i, r);
    });

  } catch (err) {
    MODELS.forEach((m, i) => renderResponse(i, {
      model: m, reply: null, citations: [], yaml_refs: [],
      latency_ms: 0, error: err.message,
    }));
  } finally {
    busy = false;
    setInputEnabled(true);
    $input.focus();
  }
}

function clearAll() {
  $input.value = '';
  $input.style.height = 'auto';
  panelEls.forEach(({ body, badge, citToggle, citList, panel }) => {
    panel.classList.remove('error-state');
    body.className = 'panel-body';
    body.innerHTML = `<div class="placeholder">Ask a question below to compare responses.</div>`;
    badge.className = 'latency-badge';
    badge.textContent = '';
    citToggle.style.display = 'none';
    citList.className = 'citation-list';
    citList.innerHTML = '';
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// Event wiring
// ─────────────────────────────────────────────────────────────────────────────
$askBtn.addEventListener('click', ask);
$clearBtn.addEventListener('click', clearAll);
$input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); ask(); }
});
$input.addEventListener('input', () => {
  $input.style.height = 'auto';
  $input.style.height = Math.min($input.scrollHeight, 120) + 'px';
});

// ─────────────────────────────────────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────────────────────────────────────
loadSkillMeta();
$input.focus();
</script>
</body>
</html>
