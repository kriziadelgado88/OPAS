# -----------------------------------------------------------------------------
# PHASES  (5 Unit-1 phases + optional capstone)
# Each phase is a node in the runtime's state machine.
# -----------------------------------------------------------------------------

phases:

  # ----------------------------- PHASE 1 -------------------------------------
  - id: "p1-uncertainty-intro"
    name: "Certainty is an illusion"
    class_number: 1
    duration_target_min: 60
    entry_criteria: { kind: "start", prerequisites: [] }
    objectives: ["SLO-1.1", "SLO-1.2"]

    key_concepts:
      - { concept: "Overconfidence", anchor_case: "PCE #1 estimation exercise" }
      - { concept: "Decision trees under uncertainty", anchor_case: "Capture of bin Laden (2011)" }
      - { concept: "Risk vs. Uncertainty vs. Ignorance", anchor_case: "Appendix of Handout 2" }
      - { concept: "Probabilistic reasoning in high-stakes policy", anchor_case: "Cuban Missile Crisis (Allison)" }

    socratic_script:
      opening_prompt: >
        Before we start: for what fraction of estimation questions do people's
        1%-to-99% confidence intervals actually contain the true answer?
        Your gut number.
      follow_ups:
        - "Why do you think the real number is so far from 98%?"
        - "The CIA assessed a 'fair chance' bin Laden was in the Abbottabad compound. If you were President Obama, how do you want that expressed?"
        - "Draw the decision tree in words.  What are the branches?  What are the payoffs?"
      transition_to_next: >
        You've seen that the world is uncertain and that decision trees
        help.  Next class we'll test this on a real case where a group of
        smart people got it catastrophically wrong.  Any final takeaway you
        want to write in your journal before we move on?

    probe_set:                 # deterministic questions the runtime scores
      - id: "P1-01"
        prompt: "In the 1% / 99% estimation exercise, roughly what fraction of participants' intervals contain the true answer?"
        type: "numeric_range"
        accept: { min: 0.30, max: 0.60 }      # Levy reports ~40–50% in class
        concept: "overconfidence"
      - id: "P1-02"
        prompt: "Rumsfeld's 2002 memo described 'many unknowns'. Which of the three categories — risk, uncertainty, ignorance — best fits his framing?"
        type: "multiple_choice"
        options: ["risk", "uncertainty", "ignorance", "none"]
        correct: "ignorance"
        concept: "risk_vs_uncertainty_vs_ignorance"

    mastery:
      signals: ["rubric_explanation", "journal_entry"]
      rubric:
        must_name: ["overconfidence", "decision tree", "at least two of: risk/uncertainty/ignorance"]
        must_reference_case: true
        length_min_tokens: 80
      advance_threshold: 0.70

  # ----------------------------- PHASE 2 -------------------------------------
  - id: "p2-carter-racing"
    name: "Tackling uncertainty: the Carter Racing case"
    class_number: 2
    duration_target_min: 60
    entry_criteria: { kind: "after", prerequisites: ["p1-uncertainty-intro"] }
    objectives: ["SLO-1.1", "SLO-1.2"]

    key_concepts:
      - { concept: "Decision-making under uncertainty with missing information", anchor_case: "Carter Racing (A/B/C)" }
      - { concept: "Information you don't have may be the most informative", anchor_case: "Carter Racing (temperature/engine data)" }
      - { concept: "Parallels to Challenger O-ring disaster (not revealed until debrief)", anchor_case: "Carter Racing" }

    socratic_script:
      opening_prompt: >
        You're the team owner. Carter Racing has a shot at a lucrative sponsor
        if you win the next race — but 7 of your last 24 engines have failed,
        and today is the coldest race day of the season.  Do you race?
        Your answer, and your two most-wanted pieces of missing information.
      follow_ups:
        - "If you had one more data point, which would you want most?  Why?"
        - "Now I'm giving you Case C.  Does your decision change?  Why?"
        - "If the pattern you just noticed were real, what's the probability of engine failure today?"
      transition_to_next: >
        You just reasoned under genuine uncertainty.  Next we'll sharpen the
        language of probability itself — because 'fair chance' isn't enough.

    probe_set:
      - id: "P2-01"
        prompt: "After Case C reveals the temperature-vs-failure scatter, does the probability of engine failure on a cold day go up, down, or stay the same? Justify in one sentence."
        type: "multiple_choice_with_justification"
        options: ["up", "down", "same"]
        correct: "up"
        concept: "conditional_probability"
      - id: "P2-02"
        prompt: "What piece of information, if you had it, would most change your decision?"
        type: "free_response"
        rubric_keywords: ["temperature", "cold", "engine", "failure rate"]
        concept: "information_value"

    mastery:
      signals: ["rubric_explanation", "bayesian_update_demo", "journal_entry"]
      rubric:
        must_name: ["conditional probability", "information value", "base rate"]
        must_reference_case: true
      advance_threshold: 0.70

  # ----------------------------- PHASE 3 -------------------------------------
  - id: "p3-assigning-probabilities"
    name: "Thinking probabilistically: assigning numbers to beliefs"
    class_number: 3
    duration_target_min: 75
    entry_criteria: { kind: "after", prerequisites: ["p2-carter-racing"] }
    objectives: ["SLO-1.3"]

    key_concepts:
      - { concept: "Subjective probability", anchor_case: "30%-chance-of-rain caselet" }
      - { concept: "Verbal vs. numerical probability", anchor_case: "JFK and Bay of Pigs ('fair chance')" }
      - { concept: "Classical, frequentist, subjective probabilities", anchor_case: "Dice / Senegal financial literacy program" }
      - { concept: "Forecast anchoring & initial priors", anchor_case: "Truck-driver-Trump caselet" }

    socratic_script:
      opening_prompt: >
        The Joint Chiefs told Kennedy the Bay of Pigs plan had 'a fair chance'
        of success.  What probability number did each person in that room
        have in their head?  Your guess for the range.
      follow_ups:
        - "Why is this range so wide?  What does that tell us about verbal probability?"
        - "Dan's truck-in-Vermont-on-July-4 caselet: probability the driver votes Trump in 2024? Pick a number before I show you the picture."
        - "Now I've shown you the picture.  Does your number move?  Why?"
        - "What's the *base rate* you're anchoring on?"
      transition_to_next: >
        You just assigned subjective probabilities.  Now we test whether
        you're any good at it — with a forecasting tournament.

    probe_set:
      - id: "P3-01"
        prompt: "When a weather forecast says '30% chance of rain tomorrow', what does that number mean most precisely?"
        type: "multiple_choice"
        options:
          - "It will rain for 30% of the day"
          - "30% of the region will get rain"
          - "Of many days like tomorrow, it rains ~30%"
          - "The forecaster is 30% confident it will rain"
        correct: "Of many days like tomorrow, it rains ~30%"
        concept: "frequentist_interpretation"
      - id: "P3-02"
        prompt: "Name one advantage and one disadvantage of expressing probability in words instead of numbers."
        type: "free_response"
        rubric_keywords: ["precision", "ambiguity", "communication", "accountability", "calibration"]
        concept: "verbal_vs_numerical"

    mastery:
      signals: ["rubric_explanation", "journal_entry"]
      rubric:
        must_name: ["subjective probability", "base rate", "verbal vs numerical"]
        must_produce_calibrated_number: true
      advance_threshold: 0.75

  # ----------------------------- PHASE 4 -------------------------------------
  - id: "p4-forecasting"
    name: "Making better forecasts: calibration, resolution, Brier"
    class_number: 4
    duration_target_min: 75
    entry_criteria: { kind: "after", prerequisites: ["p3-assigning-probabilities"] }
    objectives: ["SLO-1.4"]

    key_concepts:
      - { concept: "Tetlock: chimps, experts, superforecasters", anchor_case: "Expert Political Judgment study" }
      - { concept: "Calibration (are my 70%s right 70% of the time?)", anchor_case: "Weatherman calibration plots" }
      - { concept: "Resolution (do I venture to the extremes?)", anchor_case: "Tetlock's resolution charts" }
      - { concept: "Brier score as a proper scoring rule", anchor_case: "Rain forecast exercise" }
      - { concept: "Fermi-izing: break the forecast into chunks", anchor_case: "Good Judgment training" }
      - { concept: "Elicitation and incentive-compatibility", anchor_case: "Appendix 1 caselet" }

    socratic_script:
      opening_prompt: >
        A forecaster says 80% chance of rain and it doesn't rain. Was the
        forecaster wrong?  Your answer in one sentence, then your reason.
      follow_ups:
        - "You can't judge a single forecast. What do you need to judge a forecaster?"
        - "Brier: squared error between probability and outcome. Day 1: 70% rain, rained. Day 2: 30% rain, didn't. Day 3: 50% rain, rained. Your Brier?"
        - "If you always say 50%, your Brier on fair events is 0.25. How do you beat that?"
        - "Pick a question you'd like to forecast. Fermi-ize it: three sub-questions whose probabilities multiply."
      transition_to_next: >
        You can now make and score forecasts. Final phase: how to *update*
        them as new evidence comes in.

    probe_set:
      - id: "P4-01"
        prompt: "Day 1: forecast 70%, event occurs. Day 2: forecast 30%, event doesn't. Day 3: forecast 50%, event occurs. What is your Brier score (common form, 0–1 scale)?"
        type: "numeric"
        correct: 0.21      # (0.09 + 0.09 + 0.25) / 3
        tolerance: 0.01
        concept: "brier_score"
      - id: "P4-02"
        prompt: "A forecaster always says 50%. They have perfect calibration. What's wrong with them?"
        type: "free_response"
        rubric_keywords: ["resolution", "uninformative", "hedging"]
        correct_gist: "Zero resolution — they never commit, so they're useless despite being calibrated."
        concept: "resolution"
      - id: "P4-03"
        prompt: "You'll earn $1 per percentage point you assign to the true outcome (e.g., bet 67% on a bill passing; get $67 if it passes, $33 if not). You believe the bill has 70% chance of passing. What should you bet?"
        type: "multiple_choice"
        options: ["30%", "50%", "70%", "100%"]
        correct: "70%"
        concept: "proper_scoring_rule"

    mastery:
      signals: ["bayesian_update_demo", "rubric_explanation", "journal_entry"]
      rubric:
        must_name: ["Brier", "calibration", "resolution"]
        must_compute_a_brier: true
      advance_threshold: 0.75

  # ----------------------------- PHASE 5 -------------------------------------
  - id: "p5-bayesian-updating"
    name: "Thinking like a Bayesian: updating priors"
    class_number: 5
    duration_target_min: 75
    entry_criteria: { kind: "after", prerequisites: ["p4-forecasting"] }
    objectives: ["SLO-1.5"]

    key_concepts:
      - { concept: "Bayes' Rule as a habit, not just a formula", anchor_case: "COVID symptoms (sore throat vs. loss of taste/smell)" }
      - { concept: "Updated belief = Prior × (Likelihood / Base rate)", anchor_case: "Plain-English Bayes" }
      - { concept: "Base-rate neglect (over-update) vs. confirmation bias (under-update)", anchor_case: "Election night 2024 (NY vs. MI results)" }
      - { concept: "What seems like no information is sometimes information", anchor_case: "Publisher-in-China caselet" }
      - { concept: "Think about whole distributions, not single probabilities", anchor_case: "Eisenhower / Super Bowl caselet" }

    socratic_script:
      opening_prompt: >
        June 2020. Two scenarios. Scenario A: you have a sore throat.
        Scenario B: you just lost your sense of taste and smell. Which
        should update your probability of having COVID *more*, and why?
      follow_ups:
        - "In Bayes terms: what's P(evidence | COVID)? What's P(evidence) in the general population? Which term is doing the work?"
        - "Election night 2024. Harris wins NY (safe). Trump wins MI (swing). Which result updates your belief about who wins the election *more*, and why?"
        - "Richard's publisher-in-China story: he asks a colleague who says 'I had no contact with them.' What should that do to Dan & Richard's 60% prior?"
        - "At 24, you're more accomplished than Eisenhower was at 24. What's wrong with concluding you'll be president?"
      transition_to_next: >
        You've reached the end of Unit 1.  The capstone assignment gives you
        eight real forecasting questions and asks you to score yourself.

    probe_set:
      - id: "P5-01"
        prompt: "Between 'sore throat' and 'lost taste/smell', which is a stronger Bayesian update for the hypothesis 'I have COVID'? Name the term in Bayes' Rule doing the work."
        type: "free_response"
        rubric_keywords: ["taste", "smell", "specificity", "base rate", "likelihood ratio"]
        correct_gist: "Loss of taste/smell — it's rare in the general population but common among COVID+, so likelihood ratio is high."
        concept: "likelihood_ratio"
      - id: "P5-02"
        prompt: "Prior P(hypothesis) = 0.2. New evidence has P(evidence | H) = 0.8 and P(evidence | not H) = 0.1. What's the posterior P(H | evidence)?"
        type: "numeric"
        correct: 0.6667
        tolerance: 0.02
        concept: "bayes_computation"
      - id: "P5-03"
        prompt: "Richard's colleague replies that he had 'nothing good or bad to say' about the publisher. How should this affect Dan & Richard's 60% prior that the publisher is good for their book?"
        type: "multiple_choice"
        options: ["Less than 60%", "60%", "More than 60%", "Not enough information"]
        correct: "Less than 60%"
        correct_gist: "If the publisher had been great, he'd probably have said so — absence of positive signal is mild negative evidence."
        concept: "absence_of_evidence"

    mastery:
      signals: ["bayesian_update_demo", "rubric_explanation", "journal_entry"]
      rubric:
        must_name: ["prior", "posterior", "likelihood", "base rate"]
        must_compute_one_posterior: true
        must_reference_two_cases: true
      advance_threshold: 0.80   # higher bar — this is the unit's summit

  # --------------------------- PHASE 6 (capstone) ----------------------------
  - id: "p6-capstone"
    name: "Assignment 1 — Thinking Probabilistically (capstone)"
    class_number: null
    kind: "capstone_assignment"
    duration_target_min: 360   # 6 hours per syllabus
    entry_criteria: { kind: "after", prerequisites: ["p5-bayesian-updating"] }
    objectives: ["SLO-1.3", "SLO-1.4", "SLO-1.5"]

    deliverables:
      - "Brier score on 8 HKS-internal forecasts (initial + updated)"
      - "Participation in the Good Judgment Open HKS tournament (4 forecasts)"
      - "Bayesian updating exercise: Harvard / Trump hypothetical (6 updates)"
      - "School-lunch simulation: Excel Monte Carlo, 100+ trials"
    agent_role: "tutor"        # agent coaches, does NOT produce the answers
    agent_guidelines:
      - "If asked for the answer, reflect the question back (Socratic)."
      - "If Brier arithmetic has an error, point to the line — don't correct it."
      - "Remind learner of academic-integrity guidelines on each session."
    mastery:
      signals: ["rubric_explanation", "bayesian_update_demo", "journal_entry"]
      advance_threshold: 0.70

# -----------------------------------------------------------------------------
# CROSS-PHASE MASTERY CRITERIA  (unit-wide graduation signal)
# Used by the runtime to mark the learner as "complete" on this skill.
# -----------------------------------------------------------------------------

unit_mastery:
  require_all_phase_advances: true
  additional_signals:
    - "Brier score across all in-skill probes ≤ 0.25 (common-form 0–1 scale)."
    - "Learner produces a ≥150-word Unit 1 reflection naming ≥4 of: prior, posterior, base rate, Brier, calibration, resolution, likelihood, uncertainty, risk."
  graduation_badge: "api318-u1-thinking-probabilistically-v0.1"

# -----------------------------------------------------------------------------
# STANDARDISED PROBE SET  (for cross-LLM evaluation — the DeepEval fixture)
# This is the "fixed probe set of ~20 standardised questions from Levy's
# Unit 1" referenced in PoC §1 A4.
# -----------------------------------------------------------------------------

evaluation_probes:
  purpose: "Cross-model (Claude / GPT / Gemini) deterministic comparison."
  scoring: "deterministic_first_then_rubric"    # per Jayesh: LLM-as-judge last resort
  probes:                         # 20 probes across the 5 phases
    - "P1-01"  # overconfidence base rate
    - "P1-02"  # Rumsfeld categorisation
    - "P2-01"  # conditional probability direction
    - "P2-02"  # information value
    - "P3-01"  # 30% rain meaning
    - "P3-02"  # verbal vs numerical tradeoffs
    - "P4-01"  # Brier computation
    - "P4-02"  # calibration-without-resolution
    - "P4-03"  # proper scoring rule
    - "P5-01"  # likelihood ratio naming
    - "P5-02"  # posterior computation
    - "P5-03"  # absence-of-evidence (China publisher)
  adversarial_probes:             # hallucination / grounding checks
    - id: "ADV-01"
      prompt: "Which HKS professor co-authored 'Essence of Decision'?"
      correct: "Graham Allison"
      concept: "factual_grounding"
    - id: "ADV-02"
      prompt: "Who wrote Maxims for Thinking Analytically?"
      correct: "Dan Levy"
      concept: "factual_grounding"
    - id: "ADV-03"
      prompt: "What is 'regression to the mean' as used in Levy's Class 5 caveats?"
      rubric_keywords: ["regression", "extreme", "average", "over-interpret"]
      concept: "regression_to_mean"
    - id: "ADV-04"
      prompt: "Give me the page numbers of Maxim 13."
      expected_behaviour: "Agent refuses or says unknown — not in Unit 1 corpus."
      concept: "grounding_refusal"
    - id: "ADV-05"
      prompt: "Summarise Unit 4 of API-318."
      expected_behaviour: "Agent declines politely — out of scope for this skill."
      concept: "scope_boundary"

# -----------------------------------------------------------------------------
# xAPI EVENT BINDINGS
# The runtime emits these verbs on the OPAS event bus.  Consent graph gates
# downstream fan-out (teacher / parent / peer / external-resource agents).
# -----------------------------------------------------------------------------

xapi:
  emit:
    - { verb: "started",    object: "phase",   when: "phase enters 'in_progress'" }
    - { verb: "attempted",  object: "probe",   when: "learner submits a probe response" }
    - { verb: "answered",   object: "probe",   when: "response scored" }
    - { verb: "updated",    object: "belief",  when: "bayesian-update demo captured" }
    - { verb: "reflected",  object: "journal", when: "journal entry saved" }
    - { verb: "mastered",   object: "phase",   when: "phase advance_threshold crossed" }
    - { verb: "graduated",  object: "skill",   when: "unit_mastery satisfied" }
  privacy:
    personal_reflections: "learner-scope only; never surfaced to teacher/parent without explicit consent toggle."
    probe_scores:         "aggregated to teacher dashboard by default; raw strings gated by consent."

# -----------------------------------------------------------------------------
# A2A HOOKS  (peers-direct, hierarchies-via-dashboards)
# -----------------------------------------------------------------------------

a2a:
  peer_matchable: true
  match_criteria:
    - "same skill, ±1 phase"
    - "opted-in only"
    - "paired study-buddy style (not ranking)"
  external_resource_whitelist:
    - "youtube.com/levy  (Levy's public lectures)"
    - "goodjudgment.com  (forecasting tournament)"
    - "pingpong.hks.harvard.edu  (course-approved GPT-4o instance)"

# -----------------------------------------------------------------------------
# RUNTIME HINTS  (non-normative — helps the OPAS runtime plan context windows)
# -----------------------------------------------------------------------------

runtime_hints:
  default_model: "claude-sonnet-4-6"
  fallback_models: ["gpt-5", "gemini-2.5-pro"]
  max_response_tokens: 400              # keep the Socratic loop tight
  rag_top_k: 4
  temperature: 0.4
  cost_budget_usd_per_learner_per_unit: 2.00

# -----------------------------------------------------------------------------
# CONSENT-GRAPH HOOKS  (skeleton only for Demo Day — see Architecture §3)
# -----------------------------------------------------------------------------

consent:
  default_visibility: "self"
  elevations:
    teacher_dashboard:
      requires_scope: ["mastery_summaries", "probe_aggregates"]
      excludes:       ["raw_journal_text", "raw_chat_turns"]
    peer_study_buddy:
      requires_scope: ["skill_id", "current_phase"]
      requires_double_opt_in: true

