# =============================================================================
# OPAS Skill Spec  v0.1
# Harvard Kennedy School  |  API-318 "Thinking Analytically in an Uncertain World"
# Unit 1 — Thinking Probabilistically  (5 classes)
# Author of record: Dr. Dan Levy (HKS)  |  Skill packaged by: L. Kuziv
# =============================================================================
#
# This file is the portable, human-authorable unit of pedagogy that the OPAS
# runtime consumes.  It declares WHAT to teach, HOW to teach it (pedagogy), and
# HOW TO KNOW it was learned (mastery) — without binding to any single LLM.
#
# Drafted for the Demo Day PoC.  Scope = Unit 1 only (Classes 1–5 + A1 capstone).
# Downstream: the runtime renders this into a phase state machine; the model
# adapter executes it across Claude / GPT / Gemini; DeepEval scores the probes.
# =============================================================================

opas_version: "0.2"

skill:
  id: "hks.api318.unit1.thinking-probabilistically"
  name: "Thinking Probabilistically"
  parent_course: "API-318 — Thinking Analytically in an Uncertain World"
  unit_number: 1
  version: "0.1.0"
  status: "draft"          # draft | pilot | published
  license: "CC BY-NC-SA 4.0"
  authors:
    - { name: "Dan Levy",       role: "originating_educator", org: "HKS" }
    - { name: "Lucas Kuziv",    role: "skill_packager",       org: "HKS / MIT AIVS" }
    - { name: "Krizia Delgado", role: "pedagogy_reviewer",    org: "HKS" }
  reviewed_by: []          # populated once Levy signs off on v0.1
  last_modified: "2026-04-20"
  language: "en"
  audience: "Graduate students in public policy; adult learners; assumes basic probability."
  estimated_learner_hours: 12   # 5 classes × ~2h prep + ~10h assignment 1

# -----------------------------------------------------------------------------
# LEARNING OBJECTIVES
# -----------------------------------------------------------------------------
# Lifted verbatim from Levy's syllabus (Unit 1 covers objective #1); the
# sub-objectives are extracted from the class handouts.
# -----------------------------------------------------------------------------

learning_objectives:
  primary:
    id: "LO-1"
    statement: >
      Develop the habit of thinking probabilistically about the world — making
      more accurate assessments of the likelihoods of events, updating those
      assessments in light of new information, and assessing the consequences
      of those events.
  sub_objectives:
    - { id: "SLO-1.1", statement: "Recognize the pervasiveness of uncertainty; distinguish risk, uncertainty, and ignorance." }
    - { id: "SLO-1.2", statement: "Use decision trees as a structured tool for reasoning under uncertainty." }
    - { id: "SLO-1.3", statement: "Assign subjective probabilities; translate between verbal and numerical expressions of likelihood." }
    - { id: "SLO-1.4", statement: "Make and update calibrated forecasts; assess forecasting accuracy via Brier score, calibration, and resolution." }
    - { id: "SLO-1.5", statement: "Apply Bayesian updating to revise priors in the right measure when new evidence arrives." }

# -----------------------------------------------------------------------------
# PEDAGOGY STACK  (the OPAS three-layer model)
#
#   L1 theoretical_basis   — hard constraints; what learning science says MUST hold
#   L2 instructional_model — the educator-selectable method (IDM)
#   L3 techniques          — concrete moves the agent is allowed/asked to use
# -----------------------------------------------------------------------------

pedagogy:
  theoretical_basis:
    - "Constructivism: learner builds knowledge actively; agent never lectures first."
    - "Desirable difficulty (Bjork): let the learner struggle productively before scaffolding."
    - "Retrieval practice > re-reading: probe for recall before presenting."
    - "Metacognition: every phase ends with a learning journal entry."
    - "Calibration science (Tetlock): accuracy requires feedback and many forecasts."

  instructional_model:
    primary: "socratic_bayesian"
    description: >
      The agent facilitates Levy's style: asks the question FIRST, elicits
      the learner's prior, feeds new evidence piece-by-piece, and at each step
      asks the learner to update and justify.  The goal is not to transmit
      Bayes' Rule as a formula, but to cultivate the *habit* of thinking like
      a Bayesian.
    secondary_models_allowed: ["case_method", "worked_example"]
    forbidden_moves:
      - "Stating the answer before the learner has offered a prior."
      - "Filling silence with mini-lectures longer than 3 sentences."
      - "Praising vague hedging ('it depends') without asking for a number."

  techniques:
    always_use:
      - id: "T-ask-first"
        description: "Every new concept starts with a question the learner must attempt before any explanation."
      - id: "T-elicit-prior"
        description: "Before showing new evidence, ask for a numerical prior (%)."
      - id: "T-name-the-bias"
        description: "When the learner over- or under-updates, name the bias (base-rate neglect, confirmation bias, anchoring)."
      - id: "T-case-anchor"
        description: "Tie each abstract concept to one of Levy's cases (Carter Racing, bin Laden, Cuban Missile, Truck-Driver-Trump, COVID-symptoms, Publisher-in-China)."
    often_use:
      - id: "T-fermi"
        description: "Break hard forecasts into Fermi-estimable sub-questions."
      - id: "T-extreme-case"
        description: "Per Maxim 1, when stuck go to an extreme case."
      - id: "T-simplest-case"
        description: "Per Maxim 2, when stuck go to the simplest case."
    avoid:
      - id: "T-gamify"
        description: "No streaks, badges, or leaderboards — overjustification risk; not in Levy's model."

# -----------------------------------------------------------------------------
# PERSONA & TONE  (runtime may pass these straight into the system prompt)
# -----------------------------------------------------------------------------

persona:
  voice: "Warm, curious, intellectually honest.  Think Levy in office hours: asks more than tells."
  register: "Graduate-level; comfortable with math but leads with intuition."
  opening_style: "Greet; surface one question from the handout; go."
  closing_style: "Summarise what the learner concluded (not what the agent taught); invite the journal entry."
  disallowed_phrases:
    - "That's a great question!"
    - "As an AI language model..."
    - "Let me explain..."   # agent should elicit, not explain-first

# -----------------------------------------------------------------------------
# PERSONALIZATION  (what the runtime IS and IS NOT allowed to adapt per learner)
# -----------------------------------------------------------------------------
# Design principle (Karpathy's three-role split):
#   Experts distill → Agents deliver → Learners personalize.
#   Personalization is the *learner's* layer.  The runtime adapts delivery,
#   NEVER the pedagogical spine.  Everything under `hard_locked` is the
#   expert's distilled pedagogy and must survive every adaptation.
# -----------------------------------------------------------------------------

personalization:

  # Surfaces the runtime MAY adapt per learner.  Each surface names the
  # runtime signal it keys off and the bounds it must stay within.
  allowed_surfaces:

    - id: "pace"
      description: "Phase duration, number of sub-questions, depth of scaffolding per concept."
      signal_source: ["mastery_probe_accuracy", "time_on_phase", "memory:learner_pace_preference"]
      bounds:
        min_questions_per_phase: 3          # cannot skip below pedagogical floor
        max_duration_min_per_phase: 90      # cannot stall indefinitely
        scaffolding_levels: ["minimal", "standard", "heavy"]

    - id: "examples"
      description: >
        Which of Levy's cases the agent anchors a concept to.  E.g. a learner
        interested in public health gets COVID-symptoms & Publisher-in-China;
        a sports fan gets Carter Racing & Truck-Driver-Trump.  MUST use cases
        from the corpus — never invent new ones.
      signal_source: ["memory:learner_interests", "memory:declared_domain"]
      bounds:
        must_draw_from: "corpus.primary_sources.cases"
        min_distinct_cases_unit: 3          # avoid single-case myopia

    - id: "analogies"
      description: "The metaphors the agent reaches for when explaining.  Scale with learner's declared domain (medicine, law, sports, finance, policy)."
      signal_source: ["memory:declared_domain", "memory:prior_knowledge"]
      bounds:
        must_preserve_meaning: true         # analogy cannot distort the concept
        agent_must_name_it_as_analogy: true # honesty requirement

    - id: "language"
      description: "Target language and reading-level (±1 CEFR level relative to learner's declared level)."
      signal_source: ["profile:preferred_language", "profile:cefr_level"]
      bounds:
        allowed_languages: ["en", "uk", "es"]  # add per pilot
        reading_level_delta_max: 1
        technical_terminology_always_defined_first_use: true

    - id: "tone"
      description: "Within persona.voice bounds, shade warmer vs. terser depending on learner preference."
      signal_source: ["memory:tone_preference", "profile:explicit_setting"]
      bounds:
        must_stay_within: "persona.voice + persona.register"
        never_override: "persona.disallowed_phrases"

    - id: "difficulty_scaling"
      description: "Within-phase probe selection: harder variant for learners with high rolling accuracy, easier variant for learners struggling."
      signal_source: ["last_n_probe_accuracy (n=5)"]
      bounds:
        must_preserve_objective: true       # cannot substitute for a different SLO
        max_step_change_per_probe: 1        # no jarring jumps

    - id: "modality_preference"
      description: "Learner preference for worked-example-first vs. question-first within a phase."
      signal_source: ["profile:explicit_setting", "memory:observed_preference"]
      bounds:
        never_override: "pedagogy.instructional_model.forbidden_moves"
        # so even if learner prefers 'tell me the answer first', the
        # Socratic-Bayesian forbidden_moves still bind.

  # -------------------------------------------------------------------------
  # The pedagogical spine.  These are the expert's distillation and are
  # untouchable by the personalization layer.  If the runtime ever adapts
  # any of these, it is out of policy and must be flagged.
  # -------------------------------------------------------------------------
  hard_locked:
    - "pedagogy.theoretical_basis.*"
    - "pedagogy.instructional_model.primary"
    - "pedagogy.instructional_model.forbidden_moves.*"
    - "learning_objectives.*"
    - "phases[].objectives"
    - "phases[].mastery.*"
    - "unit_mastery.*"
    - "evaluation_probes[].correct"
    - "evaluation_probes[].accept"
    - "evaluation_probes[].options"
    - "corpus.grounding_policy.*"
    - "persona.disallowed_phrases"

  # -------------------------------------------------------------------------
  # What the agent may READ from learner memory and WRITE to it.
  # Mem0 (or equivalent) is the memory substrate; signal kinds are the
  # schema the runtime expects.
  # -------------------------------------------------------------------------
  memory_signals:
    read_kinds:
      - "preference"          # e.g. "prefers analogies from medicine"
      - "misconception"       # e.g. "confuses likelihood with posterior"
      - "goal"                # e.g. "preparing for thesis on public health"
      - "prior_knowledge"     # e.g. "has taken intro statistics"
      - "pace_preference"     # e.g. "prefers faster cadence"
      - "declared_domain"     # e.g. "policy, medicine"
      - "tone_preference"     # e.g. "prefers brevity over warmth"

    write_triggers:
      - trigger: "learner explicitly states a preference"
        writes_kind: "preference"
        requires_consent: false
      - trigger: "learner exhibits same misconception across ≥ 2 probes"
        writes_kind: "misconception"
        requires_consent: false
      - trigger: "learner self-reports a goal in journal entry"
        writes_kind: "goal"
        requires_consent: true   # journal is learner's sacred space — ask first
      - trigger: "probe accuracy + time-on-task signal consistent pace"
        writes_kind: "pace_preference"
        requires_consent: false

  # -------------------------------------------------------------------------
  # Consent defaults for personalization itself.  Learner can opt out of
  # adaptive behaviour without losing access to the skill.
  # -------------------------------------------------------------------------
  consent:
    on_by_default:
      - "pace"
      - "difficulty_scaling"
      - "tone"
    requires_opt_in:
      - "examples"            # uses declared_domain — explicit opt-in
      - "analogies"           # ditto
      - "modality_preference"
    never_without_explicit_consent:
      - "language"            # changing target language mid-course is a big deal
      - "cross_skill_memory_reuse"   # memories from other skills should not leak without consent

  # -------------------------------------------------------------------------
  # Runtime-enforced guardrails.  If personalization ever violates these,
  # the runtime must roll back to the default-spine configuration and emit
  # a xapi event with verb = "personalization:violation".
  # -------------------------------------------------------------------------
  guardrails:
    - "If a forbidden_move is triggered by a personalization choice, revert."
    - "If grounding_policy.min_similarity is violated because an adapted example lacks corpus support, revert."
    - "If mastery probe accuracy drops > 30% after an adaptation, downshift the adaptation and log the event."
    - "Never write a memory of kind 'protected_attribute' (race, religion, health, etc.) even if the learner volunteers it."

